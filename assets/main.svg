<svg xmlns="http://www.w3.org/2000/svg" fill="none" width="100%"
    height="120">
    <foreignObject width="100%" height="100%">
        <div xmlns="http://www.w3.org/1999/xhtml">
            <style>
               * {
    font-family: Arial, Helvetica, sans-serif;
    font-style: normal;
}

.lime {
    color: #04ff00;
}

h1 {
    font-size: 48px;
}

@media (max-width: 900px) {
    h1 {
        font-size: 36px;
    }
}

.responsive-font {
    text-overflow: ellipsis;
    text-align: center;
}

.bold {
    font-weight: 700;
}

.blink {
    color: hsl(37, 85%, 59%);
    animation: blink-animation 1s steps(5, start) infinite;
}

@keyframes blink-animation {
    to {
        visibility: hidden;
    }
}
            </style>
            <h1 class="responsive-font lime bold">My Name is Alexey and I like <span class="blink">
                Visuals</span></h1>
        </div>
    </foreignObject>
</svg>