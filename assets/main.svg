.lime {
    color: #04ff00;
}

h1 {
    font-size: 48px;
}

.link {
    background-color: hsl(216, 65%, 17%);
    width: 24px;
    height: 24px;
    padding: 8px;
    border-radius: 9999px;
    box-sizing: content-box;

    display: flex;
    justify-content: center;
    align-items: center;

    transition: all 0.3s ease-in-out;
    box-shadow: 0px 3px 4px white;
}

.link:hover {
    svg {
        stroke: #036801;
    }

    background-color: white;
}

.links {
    display: flex;
    min-width: 40%;
    margin-inline: auto;
    justify-content: space-between;
    height: max-content;
    margin-bottom: 36px;
}

@media (max-width: 900px) {
    h1 {
        font-size: 36px;
    }
}

.responsive-font {
    text-overflow: ellipsis;
    text-align: center;
}

.bold {
    font-weight: 700;
}

.container {
    width: 100%;
    height: max-content;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 24px;
    background-color: hsl(216, 65%, 9%);
}

.blink {
    color: hsl(37, 85%, 59%);
    animation: blink-animation 1s steps(5, start) infinite;
}

@keyframes blink-animation {
    to {
        visibility: hidden;
    }
}
